<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration Blog · Victor Julia CGP</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#C9A84C; --gold-light:#e8c96a;
  --navy:#0D1F3C; --navy-mid:#1a3260;
  --night:#14142B; --white:#fff; --muted:#6b7285;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:.9rem 3rem;border-bottom:1px solid rgba(255,255,255,.07);}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--white);text-decoration:none;display:flex;align-items:center;gap:.5rem;opacity:.7;}
.topbar-logo span{width:5px;height:5px;border-radius:50%;background:var(--gold);display:inline-block;}
.topbar-back{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);text-decoration:none;transition:color .2s;}
.topbar-back:hover{color:rgba(255,255,255,.7);}

.main{flex:1;max-width:700px;margin:0 auto;width:100%;padding:3rem;}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--white);margin-bottom:.4rem;}
.panel-sub{font-size:.82rem;color:rgba(255,255,255,.4);margin-bottom:2.5rem;line-height:1.6;}

.fg{margin-bottom:1.2rem;}
.fg label{display:block;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:.45rem;}
.fg input,.fg select,.fg textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:.72rem .9rem;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.fg select option{background:var(--navy-mid);}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(201,168,76,.5);}
.fg input::placeholder,.fg textarea::placeholder{color:rgba(255,255,255,.2);}
.fg textarea{resize:vertical;min-height:240px;line-height:1.7;}
.fg-hint{font-size:.72rem;color:rgba(255,255,255,.22);margin-top:.4rem;line-height:1.5;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}

.btn-publish{background:var(--gold);color:var(--navy);padding:.85rem 2.5rem;border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:.82rem;letter-spacing:.09em;text-transform:uppercase;cursor:pointer;font-weight:500;transition:background .2s;}
.btn-publish:hover{background:var(--gold-light);}

.divider{border:none;border-top:1px solid rgba(255,255,255,.08);margin:2.5rem 0;}

.posts-list{display:flex;flex-direction:column;gap:0;}
.posts-list-title{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:1rem;}
.post-row{display:flex;justify-content:space-between;align-items:center;padding:.85rem 0;border-bottom:1px solid rgba(255,255,255,.05);}
.post-row:last-child{border-bottom:none;}
.pr-title{font-size:.88rem;color:var(--white);flex:1;}
.pr-meta{font-size:.72rem;color:rgba(255,255,255,.28);margin:0 1rem;}
.pr-cat{font-size:.65rem;letter-spacing:.07em;text-transform:uppercase;padding:.2rem .55rem;border-radius:2px;background:rgba(201,168,76,.1);color:rgba(201,168,76,.7);margin-right:.7rem;}
.btn-del{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.25);color:rgba(255,150,130,.8);padding:.3rem .75rem;border-radius:2px;font-size:.68rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;}
.btn-del:hover{background:rgba(192,57,43,.3);}
.empty{font-size:.82rem;color:rgba(255,255,255,.2);padding:1rem 0;font-style:italic;}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--navy);padding:.7rem 1.8rem;border-radius:3px;font-size:.82rem;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

@media(max-width:600px){.main{padding:1.5rem;}.topbar{padding:.9rem 1.5rem;}.frow{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <a href="https://merry-puffpuff-ddc641.netlify.app/" class="topbar-logo"><span></span>Victor Julia CGP</a>
  <a href="https://merry-puffpuff-ddc641.netlify.app/blog.html" class="topbar-back">← Retour au blog</a>
</div>

<div class="main">
  <div class="panel-title">Publier un article</div>
  <div class="panel-sub">Collez votre texte LinkedIn ou rédigez directement. L'article apparait immédiatement sur le blog.</div>

  <div class="fg">
    <label>Titre de l'article</label>
    <input type="text" id="a_titre" placeholder="5 erreurs à éviter avant de céder votre entreprise">
  </div>
  <div class="frow">
    <div class="fg">
      <label>Catégorie</label>
      <select id="a_cat">
        <option value="sante">Professions de santé</option>
        <option value="dirigeants">Dirigeants</option>
        <option value="fiscalite">Fiscalité</option>
        <option value="retraite">Retraite</option>
        <option value="immobilier">Immobilier</option>
      </select>
    </div>
    <div class="fg">
      <label>Emoji</label>
      <input type="text" id="a_emoji" placeholder="🏥" maxlength="4">
    </div>
  </div>
  <div class="fg">
    <label>Contenu</label>
    <textarea id="a_content" placeholder="Collez votre post LinkedIn ici, ou rédigez directement..."></textarea>
    <div class="fg-hint">Les sauts de ligne sont conservés. Le début du texte sera utilisé comme extrait dans la carte blog.</div>
  </div>
  <button class="btn-publish" onclick="publish()">Publier l'article →</button>

  <hr class="divider">

  <div class="posts-list-title">Articles publiés</div>
  <div class="posts-list" id="postsList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const cats = {
  sante:      { label:'Professions de santé' },
  dirigeants: { label:'Dirigeants' },
  fiscalite:  { label:'Fiscalité' },
  retraite:   { label:'Retraite' },
  immobilier: { label:'Immobilier' },
};

function getPosts() {
  try { return JSON.parse(localStorage.getItem('vj_posts') || '[]'); }
  catch(e) { return []; }
}
function savePosts(p) { localStorage.setItem('vj_posts', JSON.stringify(p)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function publish() {
  const titre   = document.getElementById('a_titre').value.trim();
  const cat     = document.getElementById('a_cat').value;
  const emoji   = document.getElementById('a_emoji').value.trim();
  const content = document.getElementById('a_content').value.trim();
  if (!titre || !content) { alert('Titre et contenu requis.'); return; }

  const now = new Date();
  const date = now.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
  const post = { id:'post_'+Date.now(), titre, cat, emoji: emoji||(cats[cat]&&cats[cat].emoji)||'📄', date, content, ts:Date.now() };

  const posts = getPosts();
  posts.unshift(post);
  savePosts(posts);

  document.getElementById('a_titre').value = '';
  document.getElementById('a_emoji').value = '';
  document.getElementById('a_content').value = '';

  renderList();
  toast('Article publié avec succès');
}

function deletePost(id) {
  if (!confirm('Supprimer cet article ?')) return;
  savePosts(getPosts().filter(p => p.id !== id));
  renderList();
  toast('Article supprimé');
}

function renderList() {
  const posts = getPosts();
  const list = document.getElementById('postsList');
  if (!posts.length) {
    list.innerHTML = '<div class="empty">Aucun article publié pour l\'instant.</div>';
    return;
  }
  list.innerHTML = posts.map(p => `
    <div class="post-row">
      <div style="flex:1">
        <span class="pr-cat">${(cats[p.cat]||{}).label||p.cat}</span>
        <span class="pr-title">${p.titre}</span>
      </div>
      <span class="pr-meta">${p.date}</span>
      <button class="btn-del" onclick="deletePost('${p.id}')">Supprimer</button>
    </div>`).join('');
}

renderList();
</script>
</body>
</html>
